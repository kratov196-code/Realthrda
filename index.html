<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CryptoCat Browser — стартовая страница</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1a1e2c 0%, #0f121c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            padding: 20px;
        }

        .browser {
            width: 1100px;
            max-width: 95%;
            background: #101218;
            border-radius: 24px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08);
            overflow: hidden;
        }

        .window-bar {
            background: #1b1e2a;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2a2e3e;
        }

        .window-dots {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 13px;
            height: 13px;
            border-radius: 50%;
        }
        .dot.red { background: #ff5f56; }
        .dot.yellow { background: #ffbd2e; }
        .dot.green { background: #27c93f; }

        .address-bar {
            flex: 1;
            background: #0c0e16;
            border-radius: 40px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #2a2e3e;
            font-size: 14px;
            color: #e2e4f0;
        }

        .cat-icon {
            font-size: 18px;
        }

        .url-text {
            font-family: 'Monaco', 'Menlo', monospace;
            color: #bdc3e6;
        }

        .secure-badge {
            margin-left: auto;
            font-size: 12px;
            background: #232736;
            padding: 4px 8px;
            border-radius: 20px;
            color: #7effb0;
        }

        .tabs-bar {
            display: flex;
            background: #151824;
            padding-left: 16px;
            gap: 2px;
            border-bottom: 1px solid #252a38;
        }

        .tab {
            padding: 12px 20px;
            font-size: 13px;
            background: #101218;
            color: #9da1bc;
            border-radius: 12px 12px 0 0;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.1s;
        }

        .tab.active {
            background: #1e2335;
            color: white;
            border-bottom: 2px solid #ffb347;
        }

        .browser-content {
            padding: 24px 28px;
            min-height: 500px;
            background: #0c0f18;
            color: #eef2ff;
        }

        .welcome-section {
            text-align: center;
            margin-top: 20px;
        }

        .big-cat {
            font-size: 72px;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #FFD89B, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .tagline {
            color: #8f94b0;
            margin-bottom: 40px;
        }

        .search-grid {
            display: flex;
            justify-content: center;
            gap: 28px;
            flex-wrap: wrap;
            margin: 40px 0;
        }

        .cat-card {
            background: #161b27;
            padding: 20px 28px;
            border-radius: 28px;
            width: 170px;
            text-align: center;
            transition: 0.2s;
            border: 1px solid #262d3d;
            cursor: pointer;
        }

        .cat-card:hover {
            transform: translateY(-5px);
            background: #1e2537;
            border-color: #ffb347;
        }

        .cat-emoji {
            font-size: 44px;
            display: block;
            margin-bottom: 12px;
        }

        .cat-card h4 {
            font-size: 16px;
            margin-bottom: 6px;
        }

        .cat-card p {
            font-size: 12px;
            color: #7f85a6;
        }

        .link-button {
            background: #2a2f42;
            border: none;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.1s;
            text-decoration: none;
            display: inline-block;
        }

        .link-button:hover {
            background: #ffb347;
            color: #0f111a;
        }

        .footer-note {
            margin-top: 50px;
            font-size: 12px;
            color: #4f5577;
            border-top: 1px solid #202433;
            padding-top: 24px;
            display: flex;
            justify-content: space-between;
        }

        .toolbar {
            padding: 8px 20px;
            background: #11141f;
            display: flex;
            gap: 20px;
            border-top: 1px solid #202434;
            font-size: 13px;
            color: #b1b6d4;
        }

        .tool-item {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .external-link {
            color: #ffb974;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>
<div class="browser">
    <div class="window-bar">
        <div class="window-dots">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
        <div class="address-bar">
            <span class="cat-icon">🐈‍⬛</span>
            <span class="url-text" id="urlDisplay">cryptocat://start</span>
            <span class="secure-badge">🔒 Кот-защитник</span>
        </div>
    </div>

    <div class="tabs-bar">
        <div class="tab active" data-tab="home">🐱 Мур-Лента</div>
        <div class="tab" data-tab="wiki">📁 Котознавка</div>
        <div class="tab" data-tab="settings">⚙️ Хвост-настройки</div>
    </div>

    <div class="browser-content" id="mainContent"></div>

    <div class="toolbar">
        <div class="tool-item" onclick="alert('🛡️ Анти-слежка: включена! Все ссылки открываются с защитой.')">🛡️ Анти-слежка</div>
        <div class="tool-item" onclick="alert('⭐ Сохраните эту страницу в закладки — это ваш CryptoCat браузер')">⭐ Закладки</div>
        <div class="tool-item" onclick="alert('🐱 История: сегодня вы открывали ссылки через CryptoCat')">📜 История</div>
    </div>
</div>

<script>
    // Функция для безопасного открытия ссылок в НОВОЙ вкладке
    function openLink(url) {
        if (url && url !== '#') {
            window.open(url, '_blank');
            document.getElementById('urlDisplay').innerText = url;
        }
    }

    // ГЛАВНАЯ СТРАНИЦА (рабочие ссылки!)
    function renderHome() {
        document.getElementById('mainContent').innerHTML = `
            <div class="welcome-section">
                <div class="big-cat">😺🌀</div>
                <h1>CryptoCat Browser</h1>
                <div class="tagline">Твой безопасный браузер. Жми на кнопки — ссылки реально открываются!</div>
                
                <div class="search-grid">
                    <div class="cat-card" onclick="openLink('https://www.google.com/search?q=самые+смешные+коты')">
                        <span class="cat-emoji">🔎🐈</span>
                        <h4>Мур-поиск</h4>
                        <p>Найди котов в Google</p>
                    </div>
                    <div class="cat-card" onclick="openLink('https://www.youtube.com/results?search_query=cats+funny')">
                        <span class="cat-emoji">📦🐾</span>
                        <h4>Кото-YouTube</h4>
                        <p>Видео с котами</p>
                    </div>
                    <div class="cat-card" onclick="openLink('https://purrfectplay.com')">
                        <span class="cat-emoji">🎮🐱</span>
                        <h4>Мяу-сити</h4>
                        <p>Игры для котов</p>
                    </div>
                    <div class="cat-card" onclick="openLink('https://chat.openai.com')">
                        <span class="cat-emoji">🧠✨</span>
                        <h4>Котонейрон</h4>
                        <p>AI помощник</p>
                    </div>
                </div>

                <div style="background: #131824; border-radius: 24px; padding: 18px; margin: 20px 0;">
                    <div style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: center;">
                        <span style="font-size: 32px;">🌐</span>
                        <span><strong>Популярные ссылки (работают!)</strong><br>Кликни — откроется в новой вкладке</span>
                    </div>
                    <div style="margin-top: 16px; display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;">
                        <button class="link-button" onclick="openLink('https://www.wikipedia.org')">📖 Википедия</button>
                        <button class="link-button" onclick="openLink('https://www.reddit.com/r/cats/')">🐈 Reddit (котики)</button>
                        <button class="link-button" onclick="openLink('https://cataas.com/cat')">🐱 Случайный кот</button>
                        <button class="link-button" onclick="openLink('https://www.youtube.com/watch?v=dQw4w9WgXcQ')">🎵 Кото-музыка</button>
                    </div>
                </div>

                <div class="footer-note">
                    <span>© CryptoCat — браузер с кошачьим характером</span>
                    <span>🐈 v3.0 «Лапки вверх»</span>
                </div>
            </div>
        `;
        document.getElementById('urlDisplay').innerText = "cryptocat://start";
    }

    // Котознавка (тоже с ссылками)
    function renderWiki() {
        document.getElementById('mainContent').innerHTML = `
            <div style="padding: 20px; text-align: center;">
                <span style="font-size: 60px;">📘🐈</span>
                <h2 style="margin: 20px 0;">Котознавка</h2>
                <p style="color: #bcc0dd;">Интересные факты о котах + проверенные ссылки:</p>
                <ul style="text-align: left; max-width: 400px; margin: 20px auto; background: #11151f; padding: 20px 30px; border-radius: 24px;">
                    <li style="margin: 10px 0;">🐾 <a href="#" onclick="openLink('https://ru.wikipedia.org/wiki/Кошка'); return false;">Кошка на Википедии</a></li>
                    <li style="margin: 10px 0;">😻 <a href="#" onclick="openLink('https://icatcare.org/'); return false;">Международный уход за кошками</a></li>
                    <li style="margin: 10px 0;">📸 <a href="#" onclick="openLink('https://www.instagram.com/explore/tags/cats/'); return false;">#коты в Instagram</a></li>
                    <li style="margin: 10px 0;">🎥 <a href="#" onclick="openLink('https://www.youtube.com/results?search_query=cat+documentary'); return false;">Документалки про котов</a></li>
                </ul>
                <button class="link-button" onclick="renderHome()">← Вернуться на главную</button>
            </div>
        `;
        document.getElementById('urlDisplay').innerText = "cryptocat://wiki";
    }

    function renderSettings() {
        document.getElementById('mainContent').innerHTML = `
            <div style="padding: 40px; text-align: center;">
                <span style="font-size: 60px;">⚙️🐈</span>
                <h3>Хвост-настройки</h3>
                <p style="margin: 20px;">Все ссылки открываются в новой вкладке — безопасно и удобно.</p>
                <p>✨ Можешь добавить эту страницу в закладки, как личный браузер CryptoCat ✨</p>
                <button class="link-button" onclick="openLink('https://github.com/')">🐙 GitHub (пример перехода)</button>
                <button class="link-button" onclick="renderHome()" style="margin-left: 12px;">Домой</button>
            </div>
        `;
        document.getElementById('urlDisplay').innerText = "cryptocat://settings";
    }

    // Переключение вкладок
    function setActiveTab(tabId) {
        document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
        document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
        
        if (tabId === 'home') renderHome();
        else if (tabId === 'wiki') renderWiki();
        else if (tabId === 'settings') renderSettings();
    }

    // Обработчики вкладок
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            const tabId = tab.getAttribute('data-tab');
            setActiveTab(tabId);
        });
    });

    // Запускаем домашнюю страницу
    renderHome();
</script>
</body>
</html>
